<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Geng Plan & Onz</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        body{
            background:#f5f6fa;
        }

        .sidebar{
            width:250px;
            min-height:100vh;
            background:#0d6efd;
        }

        .sidebar a{
            color:white;
            text-decoration:none;
            display:block;
            padding:15px 20px;
        }

        .sidebar a:hover{
            background:rgba(255,255,255,.15);
        }

        .card{
            border:none;
            border-radius:15px;
        }

        .card h2{
            font-weight:bold;
        }

        .topbar{
            background:white;
            height:70px;
            border-bottom:1px solid #ddd;
        }

    </style>

</head>

<body>

<div class="container-fluid">

<div class="row">

    <!-- Sidebar -->

    <div class="col-md-2 p-0 sidebar">

        <h3 class="text-center text-white py-4">
            GPO
        </h3>

        <a href="#">
            <i class="bi bi-speedometer2"></i>
            Dashboard
        </a>

        <a href="#">
            <i class="bi bi-people-fill"></i>
            Ahli
        </a>

        <a href="#">
            <i class="bi bi-wallet2"></i>
            Pembayaran
        </a>

        <a href="#">
            <i class="bi bi-receipt"></i>
            Resit
        </a>

        <a href="#">
            <i class="bi bi-bar-chart-fill"></i>
            Laporan
        </a>

        <a href="#">
            <i class="bi bi-gear-fill"></i>
            Tetapan
        </a>

    </div>

    <!-- Content -->

    <div class="col-md-10 p-0">

        <!-- Topbar -->

        <div class="topbar d-flex align-items-center justify-content-between px-4">

            <h4>
                Dashboard
            </h4>

            <span>
                Bendahari
            </span>

        </div>

        <div class="container py-4">

            <div class="row g-4">

                <div class="col-md-3">

                    <div class="card shadow">

                        <div class="card-body">

                            <h6>Jumlah Ahli</h6>

                            <h2 id="totalMember">
                                0
                            </h2>

                        </div>

                    </div>

                </div>

                <div class="col-md-3">

                    <div class="card shadow">

                        <div class="card-body">

                            <h6>Dah Bayar</h6>

                            <h2 id="paidMember">
                                0
                            </h2>

                        </div>

                    </div>

                </div>

                <div class="col-md-3">

                    <div class="card shadow">

                        <div class="card-body">

                            <h6>Belum Bayar</h6>

                            <h2 id="unpaidMember">
                                0
                            </h2>

                        </div>

                    </div>

                </div>

                <div class="col-md-3">

                    <div class="card shadow">

                        <div class="card-body">

                            <h6>Jumlah Kutipan</h6>

                            <h2 id="totalPayment">
                                RM0
                            </h2>

                        </div>

                    </div>

                </div>

            </div>

            <div class="card shadow mt-4">

                <div class="card-header">

                    Aktiviti Terkini

                </div>

                <div class="card-body">

                    <table class="table table-striped">

                        <thead>

                        <tr>

                            <th>Tarikh</th>

                            <th>Nama</th>

                            <th>Bayaran</th>

                            <th>Status</th>

                        </tr>

                        </thead>

                        <tbody id="recentPayment">

                            <tr>

                                <td colspan="4" class="text-center">

                                    Tiada rekod

                                </td>

                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
