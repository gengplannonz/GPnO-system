<!DOCTYPE html>
<html lang="ms">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Geng Plan & Onz</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Arial,sans-serif;
}

body{
    background:#f2f4f8;
    overflow:hidden;
}

/* ======================
        TOP BAR
====================== */

.header{

    position:fixed;
    top:0;
    left:0;
    right:0;

    height:60px;

    background:#0d6efd;
    color:white;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 20px;

    z-index:999;

}

.logo{

    display:flex;
    align-items:center;
    gap:15px;

}

.logo h2{

    font-size:22px;

}

.menuBtn{

    display:none;

    font-size:28px;

    cursor:pointer;

}

/* ======================
        SIDEBAR
====================== */

.sidebar{

    position:fixed;

    top:60px;
    left:0;

    width:250px;
    height:calc(100vh - 60px);

    background:#1f2937;

    overflow:auto;

    transition:.3s;

}

.sidebar a{

    display:block;

    padding:16px 20px;

    color:white;

    text-decoration:none;

    transition:.2s;

}

.sidebar a:hover{

    background:#0d6efd;

}

.sidebar a.active{

    background:#0d6efd;

}

/* ======================
        CONTENT
====================== */

.content{

    margin-left:250px;
    margin-top:60px;

    height:calc(100vh - 60px);

}

.content iframe{

    width:100%;
    height:100%;

    border:none;

    background:white;

}

/* ======================
        MOBILE
====================== */

@media(max-width:768px){

.sidebar{

    left:-260px;

}

.sidebar.show{

    left:0;

}

.content{

    margin-left:0;

}

.menuBtn{

    display:block;

}

}

</style>

</head>

<body>

<!-- ===========================
            HEADER
=========================== -->

<div class="header">

    <div class="logo">

        <div class="menuBtn" onclick="toggleMenu()">
            ☰
        </div>

        <h2>
            Geng Plan & Onz
        </h2>

    </div>

    <div>

        Bendahari

    </div>

</div>

<!-- ===========================
            SIDEBAR
=========================== -->

<div class="sidebar" id="sidebar">

<a href="#" class="active"
onclick="loadPage('pages/dashboard.html',this)">
🏠 Dashboard
</a>

<a href="#"
onclick="loadPage('pages/member.html',this)">
👥 Ahli
</a>

<a href="#"
onclick="loadPage('pages/payment.html',this)">
💰 Pembayaran
</a>

<a href="#"
onclick="loadPage('pages/resit.html',this)">
🧾 Resit
</a>

<a href="#"
onclick="loadPage('pages/report.html',this)">
📊 Laporan
</a>

<a href="#"
onclick="loadPage('pages/setting.html',this)">
⚙️ Tetapan
</a>

</div>

<!-- ===========================
            CONTENT
=========================== -->

<div class="content">

<iframe

id="mainFrame"

src="pages/dashboard.html"

name="mainFrame">

</iframe>

</div>

<script>

function loadPage(page,obj){

document.getElementById("mainFrame").src=page;

let menu=document.querySelectorAll(".sidebar a");

menu.forEach(x=>x.classList.remove("active"));

obj.classList.add("active");

if(window.innerWidth<=768){

document.getElementById("sidebar").classList.remove("show");

}

}

function toggleMenu(){

document.getElementById("sidebar").classList.toggle("show");

}

window.addEventListener("resize",function(){

if(window.innerWidth>768){

document.getElementById("sidebar").classList.remove("show");

}

});

</script>

</body>
</html>
